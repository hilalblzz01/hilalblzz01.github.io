<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --card: #0d0d14;
    --border: rgba(255,255,255,0.07);
    --accent: #7DF9FF;
    --accent2: #FF5F5F;
    --accent3: #A78BFA;
    --text: #e8e8f0;
    --sub: #666680;
  }

  body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(125,249,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(125,249,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: orbFloat 8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent3); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: var(--accent); bottom: -50px; right: -50px; animation-delay: -4s; }
  .orb3 { width: 200px; height: 200px; background: var(--accent2); top: 50%; left: 50%; animation-delay: -2s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.1); }
  }

  .card {
    position: relative;
    width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    overflow: hidden;
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.6);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Card shimmer border */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(125,249,255,0.3), transparent 40%, rgba(167,139,250,0.3));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Scan line effect */
  .card::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    right: 0;
    height: 200%;
    background: linear-gradient(transparent 40%, rgba(125,249,255,0.015) 50%, transparent 60%);
    animation: scan 6s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0% { transform: translateY(-50%); }
    100% { transform: translateY(50%); }
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.2s both;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .dot1 { background: var(--accent2); animation-delay: 0s; }
  .dot2 { background: #FFD700; animation-delay: 0.2s; }
  .dot3 { background: #4ADE80; animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .header-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-left: 8px;
  }

  /* Name */
  .name-section {
    margin-bottom: 8px;
    animation: fadeUp 0.6s 0.3s both;
  }
  .name {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cursor {
    display: inline-block;
    width: 3px;
    height: 32px;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Tags */
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 14px 0 28px;
    animation: fadeUp 0.6s 0.4s both;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid;
    transition: all 0.2s;
  }
  .tag:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .tag-cyan { color: var(--accent); border-color: rgba(125,249,255,0.3); background: rgba(125,249,255,0.05); }
  .tag-purple { color: var(--accent3); border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.05); }
  .tag-red { color: var(--accent2); border-color: rgba(255,95,95,0.3); background: rgba(255,95,95,0.05); }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
    margin: 24px 0;
  }

  /* Sub label */
  .sub-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.5s both;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s 0.6s both;
  }
  .btn-row { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0) scale(0.98); }

  /* Ripple */
  .btn .ripple {
    position: absolute;
    border-radius: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.15);
    transform: translate(-50%, -50%);
    animation: rippleAnim 0.5s ease-out forwards;
  }
  @keyframes rippleAnim {
    to { width: 200px; height: 200px; opacity: 0; }
  }

  .btn-support {
    color: var(--accent2);
    border-color: rgba(255,95,95,0.25);
    background: rgba(255,95,95,0.05);
  }
  .btn-support::before { background: rgba(255,95,95,0.08); }
  .btn-support:hover { border-color: rgba(255,95,95,0.5); box-shadow: 0 8px 24px rgba(255,95,95,0.15); }

  .btn-tiktok {

  .btn-tiktok:hover { border-color: rgba(255,255,255,0.25); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

  .btn-whatsapp:hover { border-color: rgba(74,222,128,0.5); box-shadow: 0 8px 24px rgba(74,222,128,0.15); }

  .btn-discord {
    color: var(--accent3);
    border-color: rgba(167,139,250,0.25);
    background: rgba(167,139,250,0.05);
  }
  .btn-discord::before { background: rgba(167,139,250,0.08); }
  .btn-discord:hover { border-color: rgba(167,139,250,0.5); box-shadow: 0 8px 24px rgba(167,139,250,0.15); }

  /* Icon SVGs inline */
  .icon { width: 14px; height: 14px; flex-shrink: 0; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--sub);
    animation: fadeUp 0.6s 0.8s both;
  }
  .footer span {
    color: var(--accent2);
    animation: heartbeat 1.5s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)} 14%{transform:scale(1.3)} 28%{transform:scale(1)}
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.4;
  }
</style>
</head>

<script>
// Ripple effect
function ripple(e) {
  const btn = e.currentTarget;
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = btn.getBoundingClientRect();
  r.style.left = (e.clientX - rect.left) + 'px';
  r.style.top = (e.clientY - rect.top) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// Particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.5;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.alpha = Math.random() * 0.5 + 0.1;
    const colors = ['125,249,255','167,139,250','255,95,95'];
    this.color = colors[Math.floor(Math.random()*colors.length)];
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();
</script>
